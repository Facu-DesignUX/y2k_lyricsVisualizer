<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y2K Lyrical Visualizer</title>
  <meta name="description"
    content="Visualiza letras en estilos brat, Y2K e hyperpop. Expórtalas como imagen o vídeo." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Oswald:wght@700&family=Black+Han+Sans&family=Barlow+Condensed:wght@900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <div id="app">

    <!-- ===================== SIDEBAR PANEL ===================== -->
    <aside id="sidebar">

      <header id="sidebar-header">
        <span id="logo">brat visualizer</span>
      </header>

      <!-- TEXT INPUT -->
      <section class="panel-section" id="section-text">
        <label class="section-label" for="lyrics-input">lyrics</label>
        <textarea id="lyrics-input" placeholder="type or paste your lyrics here..." spellcheck="false"
          autocomplete="off"></textarea>
      </section>

      <!-- STYLE SELECTOR -->
      <section class="panel-section" id="section-styles">
        <label class="section-label">style</label>
        <div id="style-grid">
          <button class="style-btn active" id="btn-brat" data-style="brat">
            <span class="style-preview brat-preview">brat</span>
            <span class="style-name">brat</span>
          </button>
          <button class="style-btn" id="btn-deluxe" data-style="deluxe">
            <span class="style-preview deluxe-preview">brat</span>
            <span class="style-name">deluxe</span>
          </button>
          <button class="style-btn" id="btn-remix" data-style="remix">
            <span class="style-preview remix-preview">ʇɐɹq</span>
            <span class="style-name">remix</span>
          </button>
          <button class="style-btn" id="btn-moment" data-style="moment">
            <span class="style-preview moment-preview">NOW</span>
            <span class="style-name">the moment</span>
          </button>
        </div>
      </section>

      <!-- ASPECT RATIO -->
      <section class="panel-section" id="section-aspect">
        <label class="section-label">format</label>
        <div id="aspect-grid">
          <button class="aspect-btn active" id="btn-square" data-ratio="1:1">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>1:1</span>
          </button>
          <button class="aspect-btn" id="btn-vertical" data-ratio="9:16">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="6" y="1" width="12" height="22" rx="2" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>9:16</span>
          </button>
          <button class="aspect-btn" id="btn-horizontal" data-ratio="16:9">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="1" y="6" width="22" height="12" rx="2" stroke="currentColor" stroke-width="2" />
            </svg>
            <span>16:9</span>
          </button>
        </div>
      </section>

      <!-- CONTROLS -->
      <section class="panel-section" id="section-controls">
        <label class="section-label">controls</label>

        <div class="control-row">
          <div class="control-header">
            <span class="control-label">font size</span>
            <button id="btn-custom-size" class="toggle-btn" title="Enable fixed font size">enable</button>
          </div>
          <div class="slider-wrap" id="wrap-fontsize" style="opacity: 0.3; pointer-events: none;">
            <input type="range" id="ctrl-fontsize" min="20" max="240" value="84" />
            <span class="slider-val" id="val-fontsize">84</span>
          </div>
        </div>

        <div class="control-row">
          <div class="control-header">
            <span class="control-label">auto-size limit</span>
            <button id="btn-size-limit" class="toggle-btn active" title="Stop shrinking at size 84">limit 84</button>
          </div>
        </div>

        <div class="control-row">
          <span class="control-label">line height</span>
          <div class="slider-wrap">
            <input type="range" id="ctrl-lineheight" min="95" max="140" value="110" />
            <span class="slider-val" id="val-lineheight">1.1</span>
          </div>
        </div>

        <div class="control-row">
          <span class="control-label">letter spacing</span>
          <div class="slider-wrap">
            <input type="range" id="ctrl-letterspacing" min="-5" max="30" value="0" />
            <span class="slider-val" id="val-letterspacing">0</span>
          </div>
        </div>

        <div class="control-row">
          <span class="control-label">blur</span>
          <div class="slider-wrap">
            <input type="range" id="ctrl-blur" min="0" max="5" value="0" step="0.1" />
            <span class="slider-val" id="val-blur">0</span>
          </div>
        </div>

        <!-- Text alignment -->
        <div class="control-row">
          <span class="control-label">alignment</span>
          <div id="align-grid">
            <button class="align-btn" id="btn-align-left" data-align="left" title="Left">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
                <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="2" y1="10" x2="13" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="2" y1="15" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
            <button class="align-btn" id="btn-align-center" data-align="center" title="Center">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
                <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="5" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="3" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
            <button class="align-btn" id="btn-align-right" data-align="right" title="Right">
              <svg viewBox="0 0 20 20" fill="none" width="14" height="14">
                <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="7" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="5" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Strobe speed: only visible in "moment" mode -->
        <div class="control-row" id="row-strobe-speed">
          <span class="control-label">strobe speed</span>
          <div class="slider-wrap">
            <input type="range" id="ctrl-strobe" min="1" max="30" value="10" />
            <span class="slider-val" id="val-strobe">10</span>
          </div>
        </div>

        <!-- Strobe color palettes: only visible in "moment" mode -->
        <div class="control-row" id="row-strobe-colors">
          <span class="control-label">palette</span>
          <div id="palette-grid">
            <button class="palette-swatch active" id="pal-0" data-bg="#cc0000" data-fg="#6666ff" title="Red / Blue"
              style="background: linear-gradient(135deg,#cc0000 50%,#6666ff 50%)"></button>
            <button class="palette-swatch" id="pal-1" data-bg="#8ace00" data-fg="#000000" title="Brat / Black"
              style="background: linear-gradient(135deg,#8ace00 50%,#000000 50%)"></button>
            <button class="palette-swatch" id="pal-2" data-bg="#ff00aa" data-fg="#ffee00" title="Pink / Yellow"
              style="background: linear-gradient(135deg,#ff00aa 50%,#ffee00 50%)"></button>
            <button class="palette-swatch" id="pal-3" data-bg="#7700ff" data-fg="#00ffcc" title="Purple / Cyan"
              style="background: linear-gradient(135deg,#7700ff 50%,#00ffcc 50%)"></button>
            <button class="palette-swatch" id="pal-4" data-bg="#ff6600" data-fg="#001a66" title="Orange / Navy"
              style="background: linear-gradient(135deg,#ff6600 50%,#001a66 50%)"></button>
            <button class="palette-swatch" id="pal-5" data-bg="#ffffff" data-fg="#000000" title="White / Black"
              style="background: linear-gradient(135deg,#ffffff 50%,#000000 50%)"></button>
          </div>
          <!-- Custom color pickers -->
          <div class="color-pair" style="margin-top:6px">
            <div class="color-item">
              <label for="strobe-bg-color">bg</label>
              <input type="color" id="strobe-bg-color" value="#cc0000" />
            </div>
            <div class="color-item">
              <label for="strobe-text-color">text</label>
              <input type="color" id="strobe-text-color" value="#6666ff" />
            </div>
          </div>
        </div>

        <!-- Strobe font selector: only visible in "moment" mode -->
        <div class="control-row" id="row-strobe-font">
          <span class="control-label">font</span>
          <div id="font-grid">
            <button class="font-btn active" id="font-anton" data-font="Anton" style="font-family:'Anton'">Aa</button>
            <button class="font-btn" id="font-bebas" data-font="Bebas Neue" style="font-family:'Bebas Neue'">Aa</button>
            <button class="font-btn" id="font-oswald" data-font="Oswald" style="font-family:'Oswald'">Aa</button>
            <button class="font-btn" id="font-barlow" data-font="Barlow Condensed"
              style="font-family:'Barlow Condensed'">Aa</button>
            <button class="font-btn" id="font-black" data-font="Black Han Sans"
              style="font-family:'Black Han Sans'">Aa</button>
          </div>
        </div>

      </section>

      <!-- RECORDING MODE -->
      <section class="panel-section" id="section-record">
        <label class="section-label">recording mode</label>
        <div id="mode-tabs">
          <button class="mode-tab active" id="tab-auto" data-mode="auto">auto</button>
          <button class="mode-tab" id="tab-live" data-mode="live">live type</button>
        </div>

        <!-- Auto mode: typewriter speed -->
        <div class="control-row" id="row-type-speed">
          <span class="control-label">type speed</span>
          <div class="slider-wrap">
            <input type="range" id="ctrl-typespeed" min="20" max="300" value="80" />
            <span class="slider-val" id="val-typespeed">80ms</span>
          </div>
        </div>
      </section>

      <!-- EXPORT ACTIONS -->
      <section class="panel-section" id="section-export">
        <label class="section-label">export</label>
        <div id="export-actions">
          <button id="btn-snapshot" class="action-btn">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" />
              <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
              <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            save png
          </button>
          <button id="btn-record" class="action-btn accent">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
              <circle cx="12" cy="12" r="6" fill="currentColor" />
            </svg>
            <span id="record-label">rec webm</span>
          </button>
        </div>
        <div id="record-status" class="hidden">
          <span id="record-dot"></span>
          <span id="record-timer">00:00</span>
          <button id="btn-stop-record" class="stop-btn">stop & save</button>
        </div>
      </section>

    </aside>

    <!-- ===================== CANVAS AREA ===================== -->
    <main id="canvas-area">
      <div id="canvas-wrap">
        <canvas id="main-canvas"></canvas>
        <!-- live-input kept in DOM for JS reference but permanently hidden -->
        <textarea id="live-input" aria-hidden="true"></textarea>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>

</html>
